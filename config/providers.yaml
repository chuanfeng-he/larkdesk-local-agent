providers:
  - name: gemini_api
    enabled: true
    tier: free
    capabilities:
      - cheap_chat
      - office_draft
      - coding_draft
      - doc_draft
      - ppt_draft
    mode: api
    allowedDomains: []
    headless: true
    timeoutMs: 30000
    maxConcurrency: 5
    rateLimitPerMinute: 15
    defaultPreset: standard
    metadata:
      model: gemini-2.5-flash-lite
    presets:
      standard:
        label: Gemini API 标准
        reasoningIntensity: medium
        costLevel: low
        contextWindow: high
        timeoutMs: 30000
        fallbackPriority: 5
      pro:
        label: Gemini API 增强
        reasoningIntensity: high
        costLevel: low
        contextWindow: high
        timeoutMs: 45000
        fallbackPriority: 4
      expert:
        label: Gemini API 专家
        reasoningIntensity: very_high
        costLevel: medium
        contextWindow: high
        timeoutMs: 60000
        fallbackPriority: 3
      deep:
        label: Gemini API 深度
        reasoningIntensity: very_high
        costLevel: medium
        contextWindow: very_high
        timeoutMs: 90000
        fallbackPriority: 2

  - name: mock_provider
    enabled: true
    tier: cheap
    capabilities:
      - cheap_chat
      - office_draft
      - office_review
      - office_arbiter
      - coding_draft
      - coding_review
      - coding_arbiter
      - doc_draft
      - doc_review
      - image_draft
      - image_review
      - ppt_draft
      - ppt_review
      - video_draft
      - video_review
    mode: persistent
    allowedDomains: []
    headless: true
    timeoutMs: 10000
    maxConcurrency: 2
    rateLimitPerMinute: 30
