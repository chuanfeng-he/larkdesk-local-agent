  - name: chatgpt_web
    enabled: true
    tier: strong
    capabilities:
      - office_arbiter
      - coding_arbiter
      - doc_review
      - ppt_review
    mode: cdp
    browser: chromium
    cdpEndpoint: http://127.0.0.1:9222
    baseUrl: https://chatgpt.com/
    selectorProfile: selector-profiles/chatgpt-web.yaml
    allowedDomains:
      - chatgpt.com
      - chat.openai.com
      - openai.com
      - oaistatic.com
      - oaiusercontent.com
    headless: false
    timeoutMs: 90000
    maxConcurrency: 1
    rateLimitPerMinute: 8
    defaultPreset: standard
    presets:
      standard:
        label: 标准模式
        reasoningIntensity: medium
        costLevel: medium
        contextWindow: high
        timeoutMs: 90000
        fallbackPriority: 40
        uiMode:
          modelSlug: standard
          reasoningMode: standard
          openMenuSelectors:
            - "button[data-testid='model-switcher-dropdown-button']"
            - "button[aria-label='模型选择器']"
            - "button[aria-label='Model selector']"
          optionSelectors:
            - "[data-testid='model-switcher-gpt-5-3']"
            - "[role='menuitem']"
          optionText: "Instant"
      pro:
        label: 增强模式
        reasoningIntensity: high
        costLevel: high
        contextWindow: high
        timeoutMs: 120000
        fallbackPriority: 30
        uiMode:
          modelSlug: pro
          reasoningMode: enhanced
          openMenuSelectors:
            - "button[data-testid='model-switcher-dropdown-button']"
            - "button[aria-label='模型选择器']"
            - "button[aria-label='Model selector']"
          optionSelectors:
            - "[data-testid='model-switcher-gpt-5-4-thinking']"
            - "[role='menuitem']"
          optionText: "Thinking"
          verifySelectors:
            - "div[data-testid='composer-footer-actions']:has-text('进阶思考')"
      expert:
        label: 专家模式
        reasoningIntensity: very_high
        costLevel: premium
        contextWindow: very_high
        timeoutMs: 150000
        fallbackPriority: 20
        uiMode:
          modelSlug: advanced
          reasoningMode: expert
          openMenuSelectors:
            - "button[data-testid='model-switcher-dropdown-button']"
            - "button[aria-label='模型选择器']"
            - "button[aria-label='Model selector']"
          optionSelectors:
            - "[data-testid='model-switcher-gpt-5-4-thinking']"
            - "[role='menuitem']"
          optionText: "Thinking"
          verifySelectors:
            - "div[data-testid='composer-footer-actions']:has-text('进阶思考')"
      deep:
        label: 深度思考
        reasoningIntensity: very_high
        costLevel: premium
        contextWindow: very_high
        timeoutMs: 180000
        fallbackPriority: 10
        uiMode:
          modelSlug: advanced
          reasoningMode: deep
          openMenuSelectors:
            - "button[data-testid='model-switcher-dropdown-button']"
            - "button[aria-label='模型选择器']"
            - "button[aria-label='Model selector']"
          optionSelectors:
            - "[data-testid='model-switcher-gpt-5-4-thinking']"
            - "[role='menuitem']"
          optionText: "Thinking"
          verifySelectors:
            - "div[data-testid='composer-footer-actions']:has-text('进阶思考')"

