  - name: qwen_web
    enabled: true
    tier: mid
    capabilities:
      - cheap_chat
      - office_draft
      - office_review
      - coding_draft
      - coding_review
      - doc_draft
      - doc_review
      - image_review
      - ppt_draft
      - ppt_review
      - video_review
    mode: cdp
    browser: chromium
    cdpEndpoint: http://127.0.0.1:9226
    profileDir: ./.profiles/qwen-clean
    baseUrl: https://chat.qwen.ai/
    selectorProfile: selector-profiles/qwen-web.yaml
    allowedDomains:
      - chat.qwen.ai
      - qwen.ai
      - tongyi.com
      - aliyun.com
      - alicdn.com
    headless: false
    timeoutMs: 90000
    maxConcurrency: 1
    rateLimitPerMinute: 8
    defaultPreset: standard
    presets:
      standard:
        label: 标准模式
        reasoningIntensity: low
        costLevel: low
        contextWindow: medium
        timeoutMs: 90000
        fallbackPriority: 36
        uiMode:
          modelSlug: standard
          reasoningMode: standard
          steps:
            - openMenuSelectors:
                - "div[class*='model-selector-text']"
              optionSelectors:
                - ".ant-dropdown [class*='model-item']"
              optionText: "Qwen3.5-Flash"
              verifySelectors:
                - "div[class*='model-selector-text']:has-text('Qwen3.5-Flash')"
            - directSelectors:
                - "input.ant-select-selection-search-input"
              optionSelectors:
                - "[role='listbox'] [role='option']"
              optionText: "自动"
              verifySelectors:
                - "div.message-input-wrapper-position:has-text('自动')"
                - "div.message-input-wrapper:has-text('自动')"
          verifySelectors:
            - "div[class*='model-selector-text']:has-text('Qwen3.5-Flash')"
      pro:
        label: 增强模式
        reasoningIntensity: medium
        costLevel: medium
        contextWindow: high
        timeoutMs: 120000
        fallbackPriority: 22
        uiMode:
          modelSlug: plus
          reasoningMode: enhanced
          steps:
            - openMenuSelectors:
                - "div[class*='model-selector-text']"
              optionSelectors:
                - ".ant-dropdown [class*='model-item']"
              optionText: "Qwen3.5-Plus"
              verifySelectors:
                - "div[class*='model-selector-text']:has-text('Qwen3.5-Plus')"
            - directSelectors:
                - "input.ant-select-selection-search-input"
              optionSelectors:
                - "[role='listbox'] [role='option']"
              optionText: "自动"
              verifySelectors:
                - "div.message-input-wrapper-position:has-text('自动')"
                - "div.message-input-wrapper:has-text('自动')"
          verifySelectors:
            - "div[class*='model-selector-text']:has-text('Qwen3.5-Plus')"
      expert:
        label: 专家模式
        reasoningIntensity: high
        costLevel: high
        contextWindow: high
        timeoutMs: 150000
        fallbackPriority: 16
        uiMode:
          modelSlug: plus
          reasoningMode: expert
          steps:
            - openMenuSelectors:
                - "div[class*='model-selector-text']"
              optionSelectors:
                - ".ant-dropdown [class*='model-item']"
              optionText: "Qwen3.5-Plus"
              verifySelectors:
                - "div[class*='model-selector-text']:has-text('Qwen3.5-Plus')"
            - directSelectors:
                - "input.ant-select-selection-search-input"
              optionSelectors:
                - "[role='listbox'] [role='option']"
              optionText: "思考"
              verifySelectors:
                - "div.message-input-wrapper-position:has-text('思考')"
                - "div.message-input-wrapper:has-text('思考')"
          verifySelectors:
            - "div[class*='model-selector-text']:has-text('Qwen3.5-Plus')"
      deep:
        label: 深度思考
        reasoningIntensity: high
        costLevel: high
        contextWindow: high
        timeoutMs: 180000
        fallbackPriority: 11
        uiMode:
          modelSlug: plus
          reasoningMode: deep
          steps:
            - openMenuSelectors:
                - "div[class*='model-selector-text']"
              optionSelectors:
                - ".ant-dropdown [class*='model-item']"
              optionText: "Qwen3.5-397B-A17B"
              verifySelectors:
                - "div[class*='model-selector-text']:has-text('Qwen3.5-397B-A17B')"
