    enabled: true
    weight: 1
    artifactTypes: [image]
    intents: [image]
    keywords: [图片, 海报, 封面, 出图, 画一张]
    resourceHints: [image_prompt]
    toolHints: [image, screenshot]
    promptHints: [需要图片时优先生成可回传的图像文件。]
    memoryLayers: [working, episodic]
  - id: image_analysis
    packId: visual_media
    packName: 视觉媒体
    packDescription: 负责图片、截图、海报、封面等视觉产物。
