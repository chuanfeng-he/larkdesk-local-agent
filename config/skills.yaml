    enabled: true
    weight: 1
    taskTypes: [CODING]
    intents: [coding]
    resourceHints: [codex_bundle]
    toolHints: [filesystem, terminal, test]
    promptHints: [优先直接落地，不要只描述步骤。]
    memoryLayers: [working, episodic]
  - id: image_generation
    packId: visual_media
    packName: 视觉媒体
    packDescription: 负责图片、截图、海报、封面等视觉产物。
    name: 图片出图
